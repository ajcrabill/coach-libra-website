<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ page.title }}</title>
{% if page.description %}<meta name="description" content="{{ page.description }}" />{% endif %}
{% if page.noindex %}<meta name="robots" content="noindex, follow" />{% endif %}
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..600&family=Hanken+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
{% if page.pageCss %}<link rel="stylesheet" href="/assets/css/{{ page.pageCss }}.css?v={{ site.time | date: '%s' }}" />{% endif %}
<link rel="stylesheet" href="/assets/css/base.css?v={{ site.time | date: '%s' }}" />
</head>
<body class="{{ page.bodyclass }}">
{% include header.html %}
{{ content }}
{% include footer.html %}
<script>
  var y=document.getElementById('yr'); if(y){y.textContent=new Date().getFullYear();}
  var nav=document.getElementById('nav'),tg=document.getElementById('navtoggle'),nl=document.getElementById('navlinks');
  if(tg&&nl){tg.addEventListener('click',function(){nl.classList.toggle('open');});nl.addEventListener('click',function(e){if(e.target.tagName==='A'){nl.classList.remove('open');}});}
  window.addEventListener('scroll',function(){if(nav){nav.classList.toggle('scrolled',window.scrollY>10);}},{passive:true});
  // nav auth toggle: show "Sign out" when a portal token is present, and clear it on click
  var au=document.getElementById('navauth');
  window.syncNavAuth=function(){var s=false;try{s=!!localStorage.getItem('cl_token');}catch(_){}if(au){au.textContent=s?'Sign out':'Sign in';}};
  if(au){au.addEventListener('click',function(e){var s=false;try{s=!!localStorage.getItem('cl_token');}catch(_){}if(s){e.preventDefault();try{localStorage.removeItem('cl_token');}catch(_){}location.href='/portal';}});window.syncNavAuth();}
</script>
{% if page.pageScript %}<script src="/assets/js/{{ page.pageScript }}.js?v={{ site.time | date: '%s' }}"></script>{% endif %}
</body>
</html>
